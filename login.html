<!DOCTYPE html>
<html>
<head>
  <title>Login - Tap2Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center-screen">
  <div class="auth-card">
    <h2>Login</h2>

    <input id="loginEmail" type="email" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">

    <button id="loginBtn" class="blue-btn">Login</button>

    <p class="switch-link" onclick="window.location='signup.html'">
      Create an account
    </p>
  </div>

  <script type="module" src="firebase-config-v2.js"></script>

  <script type="module" src="auth.js"></script>
</body>
</html>
