<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tap2Chat – Sign Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="auth-card">
      <h1 class="auth-title">Tap2Chat</h1>
      <h2 class="auth-subtitle">Create account</h2>

      <div class="auth-field">
        <label>Username</label>
        <input id="suUsername" type="text" placeholder="Choose a username">
      </div>

      <div class="auth-field">
        <label>Password</label>
        <input id="suPassword" type="password" placeholder="Choose a password">
      </div>

      <div id="suError" class="auth-error"></div>

      <button id="suBtn" class="auth-btn">Sign up</button>

      <p class="auth-switch">
        Already have an account?
        <a href="login.html">Log in</a>
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC4RxS1VpdyP3oMPtiJH2nqlA7Y7OM5t-A",
      authDomain: "tap2chat-13249.firebaseapp.com",
      databaseURL: "https://tap2chat-13249-default-rtdb.firebaseio.com",
      projectId: "tap2chat-13249",
      storageBucket: "tap2chat-13249.firebasestorage.app",
      messagingSenderId: "109302813848",
      appId: "1:109302813848:web:7cb0386f29598ec27e2ced"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    const suBtn = document.getElementById("suBtn");
    const suUsername = document.getElementById("suUsername");
    const suPassword = document.getElementById("suPassword");
    const suError = document.getElementById("suError");

    suBtn.onclick = async () => {
      suError.textContent = "";
      const username = suUsername.value.trim().toLowerCase();
      const password = suPassword.value;

      if (!username || !password) {
        suError.textContent = "Please enter a username and password.";
        return;
      }

      const email = username + "@tap2chat.com";

      try {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await db.ref("users/" + cred.user.uid).set({
          username: username,
          role: "user",
          accent: "#87CEEB"
        });
        window.location.href = "login.html";
      } catch (e) {
        suError.textContent = e.message;
      }
    };
  </script>
</body>
</html>
