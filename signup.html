<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - Tap2Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="center-screen">
  <div class="auth-card">
    <h2>Create Account</h2>

    <input id="signupEmail" type="email" placeholder="Email">
    <input id="signupPassword" type="password" placeholder="Password">
    <input id="signupUsername" type="text" placeholder="Username">

    <label class="file-label">Profile Picture
      <input id="signupPfp" type="file" accept="image/*">
    </label>

    <button id="signupBtn" class="blue-btn">Sign Up</button>

    <p class="switch-link" onclick="window.location='login.html'">
      Already have an account?
    </p>
  </div>

  <script type="module" src="firebase-config-v2.js"></script>

  <script type="module" src="auth.js"></script>
</body>
</html>
